<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f5f5f5"/>
  
  <!-- Header -->
  <rect width="1200" height="80" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">KuroPOS Dashboard</text>
  
  <!-- Sidebar -->
  <rect width="100" height="720" y="80" fill="#1a1f3a" stroke="#0f1724" stroke-width="1"/>
  
  <!-- Main Content -->
  <rect x="100" y="80" width="1100" height="720" fill="#f9fafb"/>
  
  <!-- Search Bar -->
  <rect x="130" y="110" width="650" height="50" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" rx="8"/>
  <text x="150" y="145" font-family="Arial, sans-serif" font-size="16" fill="#9ca3af">Cari nama produk atau barcode...</text>
  
  <!-- Tambah Button -->
  <rect x="800" y="110" width="120" height="50" fill="#4f46e5" rx="8"/>
  <text x="835" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">+ Tambah</text>
  
  <!-- Product Cards -->
  <!-- Card 1 -->
  <rect x="130" y="180" width="250" height="300" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="12"/>
  <rect x="130" y="180" width="250" height="160" fill="#e8e8e8" rx="12"/>
  <rect x="140" y="190" width="230" height="140" fill="#ff4444"/>
  
  <text x="145" y="355" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a1a">Cabe</text>
  <text x="145" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4f46e5">Rp100.000/kg</text>
  <text x="145" y="410" font-family="Arial, sans-serif" font-size="14" fill="#ef4444">Stok 0.41 kg</text>
  
  <!-- Card 2 -->
  <rect x="400" y="180" width="250" height="300" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="12"/>
  <rect x="400" y="180" width="250" height="160" fill="#f0f0f0" rx="12"/>
  <text x="480" y="270" font-family="Arial, sans-serif" font-size="18" fill="#999999">No Image</text>
  
  <text x="415" y="355" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a1a">Kantang</text>
  <text x="415" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4f46e5">Rp9.000/kg</text>
  <text x="415" y="410" font-family="Arial, sans-serif" font-size="14" fill="#666666">Stok 4.68 kg</text>
  
  <!-- Card 3 -->
  <rect x="670" y="180" width="250" height="300" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="12"/>
  <rect x="670" y="180" width="250" height="160" fill="#dd3333" rx="12"/>
  
  <text x="685" y="355" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a1a">Lado Giliang</text>
  <text x="685" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4f46e5">Rp105.000/kg</text>
  <text x="685" y="410" font-family="Arial, sans-serif" font-size="14" fill="#666666">Stok 98.00 kg</text>
  
  <!-- Right Panel - Checkout -->
  <rect x="960" y="110" width="220" height="590" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="8"/>
  
  <text x="980" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#666666">CHECKOUT</text>
  <text x="980" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a1a">Keranjang</text>
  <text x="980" y="200" font-family="Arial, sans-serif" font-size="12" fill="#999999">Ringkasan transaksi</text>
  
  <!-- Cart Icon -->
  <circle cx="1070" cy="340" r="40" fill="#e5e7eb"/>
  <text x="1055" y="350" font-family="Arial, sans-serif" font-size="32">🛒</text>
  
  <text x="985" y="410" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#999999" x="1070">Keranjang masih kosong</text>
  
  <!-- Footer Info -->
  <text x="980" y="540" font-family="Arial, sans-serif" font-size="12" fill="#666666">Subtotal</text>
  <text x="1140" y="540" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#666666">Rp 0</text>
  
  <text x="980" y="565" font-family="Arial, sans-serif" font-size="12" fill="#666666">Total Belanja</text>
  <text x="1140" y="565" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="end" fill="#22c55e">Rp 0</text>
</svg>